<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FBFBF8" />
    <meta name="author" content="QuantikGrowth" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Per-page <title>, description, canonical, Open Graph, Twitter and JSON-LD
         are set by the <Seo> component (React 19 document metadata). -->

    <!-- Intro bootstrap: on a first home visit this session, hold a dark field
         from the very first paint so the cinematic intro never flashes content.
         Purely visual — the real page renders underneath (SEO unaffected), it
         self-clears after 4.5s even if the JS bundle never arrives, and it is
         skipped entirely for reduced-motion users and non-home landings. -->
    <style>
      html.qg-intro-hold body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 105;
        background: #13241c;
        animation: qg-intro-failsafe 0.6s ease 4.5s forwards;
      }
      @keyframes qg-intro-failsafe {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
    <script>
      try {
        var qgPath = location.pathname.replace(/\/+$/, "") || "/";
        var qgForced =
          /[?&]intro=replay\b/.test(location.search) || location.hash === "#intro-replay";
        if (
          qgForced ||
          ((qgPath === "/" || qgPath === "/portfolio") &&
            !sessionStorage.getItem("qg-intro-seen") &&
            !matchMedia("(prefers-reduced-motion: reduce)").matches)
        ) {
          document.documentElement.classList.add("qg-intro-hold");
        }
      } catch (e) {}
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts off the critical path: paint immediately with fallback (display=swap),
         then upgrade once the stylesheet arrives. Keeps fonts out of render-blocking. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
